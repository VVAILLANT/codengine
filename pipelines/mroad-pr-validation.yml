trigger: none

pr:
  branches:
    include:
      - develop

name: $(Date:yyyyMMdd).$(Rev:r) • PR $(System.PullRequest.PullRequestId) (codengine)
appendCommitMessageToRunName: false

# Permet le déclenchement manuel (Run pipeline) sans PR
# Dans ce cas, seul le build de Codengine est validé (smoke test)

pool:
  vmImage: ubuntu-latest

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  CODENGINE_DIR: $(Pipeline.Workspace)/codengine
  CODENGINE_DLL: $(Pipeline.Workspace)/codengine/src/Codengine.Cli/bin/Release/net9.0/Codengine.Cli.dll
  NUGET_PACKAGES: $(Pipeline.Workspace)/.nuget/packages
  CHANGED_DIR: $(Agent.TempDirectory)/changed
  REPORT_PATH: $(Agent.TempDirectory)/codengine-report.json

steps:
  - checkout: none  # On ne clone pas MROAD — uniquement les fichiers modifiés sont téléchargés

  # ── .NET 9 SDK ─────────────────────────────────────────────────────────────
  - task: UseDotNet@2
    inputs:
      packageType: sdk
      version: "9.x"
    displayName: Use .NET 9 SDK

  # ── Télécharger le .csproj de Codengine pour versioner le cache ───────────
  # Quand publish-tool.sh bumpe la version, la clé de cache change automatiquement
  - script: |
      curl -sf https://raw.githubusercontent.com/VVAILLANT/codengine/master/src/Codengine.Cli/Codengine.Cli.csproj \
        -o "$(Agent.TempDirectory)/Codengine.Cli.csproj"
      VERSION=$(grep -o '<Version>[^<]*</Version>' "$(Agent.TempDirectory)/Codengine.Cli.csproj" | grep -o '[0-9][^<]*')
      echo "Version Codengine : $VERSION"
      echo "##vso[task.setvariable variable=CODENGINE_VERSION]$VERSION"
    displayName: Fetch Codengine version

  # ── Cache NuGet Codengine ──────────────────────────────────────────────────
  - script: mkdir -p $(NUGET_PACKAGES)
    displayName: Ensure NuGet cache dir exists

  - task: Cache@2
    inputs:
      key: 'codengine-nuget | "$(Agent.OS)" | $(Agent.TempDirectory)/Codengine.Cli.csproj'
      restoreKeys: |
        codengine-nuget | "$(Agent.OS)"
      path: $(NUGET_PACKAGES)
    displayName: Cache NuGet (Codengine)

  # ── Cache build Codengine ──────────────────────────────────────────────────
  # Clé basée sur le hash du .csproj → invalidation automatique à chaque nouvelle version
  - task: Cache@2
    inputs:
      key: 'codengine-build | "$(Agent.OS)" | $(Agent.TempDirectory)/Codengine.Cli.csproj'
      restoreKeys: |
        codengine-build | "$(Agent.OS)"
      path: $(CODENGINE_DIR)/src/Codengine.Cli/bin/Release/net9.0
    displayName: Cache build Codengine

  # ── Cloner et builder Codengine ────────────────────────────────────────────
  - script: |
      if [ -f "$(CODENGINE_DLL)" ]; then
        echo "Codengine déjà buildé (cache), skip."
      else
        echo "Clonage de Codengine..."
        git clone --depth 1 https://github.com/VVAILLANT/codengine.git "$(CODENGINE_DIR)"

        echo "Build Codengine..."
        dotnet restore "$(CODENGINE_DIR)/codengine.sln"
        dotnet build "$(CODENGINE_DIR)/codengine.sln" --no-restore -c Release -v minimal
      fi

      # Smoke test : vérifier que Codengine s'exécute correctement
      echo "--- Smoke test ---"
      dotnet "$(CODENGINE_DLL)" list-rules
    displayName: Build Codengine

  # ── Télécharger uniquement les fichiers .cs modifiés par la PR ─────────────
  - script: |
      set -e
      PR_ID="$(System.PullRequest.PullRequestId)"
      ORG_URL="$(System.TeamFoundationCollectionUri)"
      PROJECT="$(System.TeamProjectId)"
      REPO_ID="$(Build.Repository.ID)"
      COMMIT_ID="$(Build.SourceVersion)"
      DEST="$(CHANGED_DIR)"

      mkdir -p "$DEST"

      echo "Récupération des fichiers modifiés pour la PR #$PR_ID..."

      # Récupérer la dernière itération de la PR
      RESPONSE=$(curl -sf \
        -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        "${ORG_URL}${PROJECT}/_apis/git/repositories/${REPO_ID}/pullRequests/${PR_ID}/iterations?api-version=7.1")

      LAST_ITERATION=$(echo "$RESPONSE" | jq '.value | length')

      # Récupérer les fichiers modifiés
      CHANGES=$(curl -sf \
        -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        "${ORG_URL}${PROJECT}/_apis/git/repositories/${REPO_ID}/pullRequests/${PR_ID}/iterations/${LAST_ITERATION}/changes?api-version=7.1")

      # Extraire les chemins des fichiers .cs ajoutés ou modifiés (pas supprimés)
      CS_FILES=$(echo "$CHANGES" | jq -r '
        .changeEntries[]
        | select(.changeType != "delete" and (.item.path | endswith(".cs")))
        | .item.path
      ')

      COUNT=$(echo "$CS_FILES" | grep -c . || true)
      echo "Fichiers .cs modifiés : $COUNT"

      if [ "$COUNT" -eq 0 ]; then
        echo "##vso[task.setvariable variable=CHANGED_CS_COUNT]0"
        exit 0
      fi

      # Télécharger chaque fichier via l'API Items (contenu au commit de la PR)
      echo "$CS_FILES" | while IFS= read -r filepath; do
        [ -z "$filepath" ] && continue

        # Recréer l'arborescence localement
        LOCAL_PATH="$DEST$filepath"
        mkdir -p "$(dirname "$LOCAL_PATH")"

        curl -sf \
          -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
          "${ORG_URL}${PROJECT}/_apis/git/repositories/${REPO_ID}/items?path=${filepath}&versionType=commit&version=${COMMIT_ID}&api-version=7.1" \
          -o "$LOCAL_PATH"

        echo "  Téléchargé : $filepath"
      done

      echo "##vso[task.setvariable variable=CHANGED_CS_COUNT]$COUNT"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    displayName: Download changed .cs files
    condition: ne(variables['System.PullRequest.PullRequestId'], '')

  # ── Analyse Codengine ──────────────────────────────────────────────────────
  - script: |
      COUNT="$(CHANGED_CS_COUNT)"

      if [ "$COUNT" -eq 0 ]; then
        echo "Aucun fichier .cs modifié, analyse ignorée."
        echo "##vso[task.setvariable variable=ANALYZE_ICON]✅"
        echo "##vso[task.setvariable variable=ANALYZE_LABEL]Aucun fichier .cs modifié"
        echo "##vso[task.setvariable variable=ANALYZE_PASSED]true"
        exit 0
      fi

      set +e
      TOTAL_VIOLATIONS=0
      TOTAL_ERRORS=0
      TOTAL_WARNINGS=0
      ALL_VIOLATIONS="[]"

      # Analyser chaque fichier .cs téléchargé
      find "$(CHANGED_DIR)" -name "*.cs" | while IFS= read -r filepath; do
        TMP_REPORT="$(Agent.TempDirectory)/report_$(echo "$filepath" | md5sum | cut -c1-8).json"
        dotnet "$(CODENGINE_DLL)" analyze "$filepath" -f json -o "$TMP_REPORT" 2>/dev/null

        if [ -f "$TMP_REPORT" ]; then
          FILE_ERRORS=$(jq '.summary.errors' "$TMP_REPORT")
          FILE_WARNINGS=$(jq '.summary.warnings' "$TMP_REPORT")
          FILE_VIOLATIONS=$(jq '.summary.totalViolations' "$TMP_REPORT")
          TOTAL_ERRORS=$((TOTAL_ERRORS + FILE_ERRORS))
          TOTAL_WARNINGS=$((TOTAL_WARNINGS + FILE_WARNINGS))
          TOTAL_VIOLATIONS=$((TOTAL_VIOLATIONS + FILE_VIOLATIONS))
          FILE_VIOLS=$(jq '.violations' "$TMP_REPORT")
          ALL_VIOLATIONS=$(echo "$ALL_VIOLATIONS $FILE_VIOLS" | jq -s 'add')
        fi
      done

      # Rapport consolidé
      jq -n \
        --argjson total $TOTAL_VIOLATIONS \
        --argjson errors $TOTAL_ERRORS \
        --argjson warnings $TOTAL_WARNINGS \
        --argjson violations "$ALL_VIOLATIONS" \
        '{summary:{totalViolations:$total,errors:$errors,warnings:$warnings,hasErrors:($errors > 0)},violations:$violations}' \
        > "$(REPORT_PATH)"

      if [ "$TOTAL_ERRORS" -eq 0 ]; then
        echo "##vso[task.setvariable variable=ANALYZE_ICON]✅"
        echo "##vso[task.setvariable variable=ANALYZE_LABEL]OK — $TOTAL_VIOLATIONS violation(s) ($TOTAL_ERRORS erreur(s), $TOTAL_WARNINGS avertissement(s))"
        echo "##vso[task.setvariable variable=ANALYZE_PASSED]true"
      else
        echo "##vso[task.setvariable variable=ANALYZE_ICON]❌"
        echo "##vso[task.setvariable variable=ANALYZE_LABEL]$TOTAL_ERRORS erreur(s), $TOTAL_WARNINGS avertissement(s)"
        echo "##vso[task.setvariable variable=ANALYZE_PASSED]false"

        jq -r '.violations[] | "- **\(.ruleId)** `\(.filePath | split("/")[-1]):\(.line)` — \(.message) [\(.severity)]"' \
          "$(REPORT_PATH)" | head -20 > "$(Agent.TempDirectory)/violations.md"
      fi
    displayName: Codengine analyze
    continueOnError: true
    condition: ne(variables['System.PullRequest.PullRequestId'], '')

  # ── Commentaire PR ─────────────────────────────────────────────────────────
  - script: |
      if [ "$(ANALYZE_PASSED)" = "true" ]; then
        HEADER="## ✅ Codengine — OK"
        SUMMARY="Aucune erreur détectée sur les fichiers modifiés par cette PR."
      else
        HEADER="## ❌ Codengine — Erreur(s) détectée(s)"
        SUMMARY="Des erreurs bloquent le merge. Veuillez corriger les violations ci-dessous."
      fi

      COMMIT_SHORT=$(echo "$(Build.SourceVersion)" | cut -c1-7)

      COMMENT_FILE="$(Agent.TempDirectory)/pr-comment.md"
      {
        echo "$HEADER"
        echo ""
        echo "$SUMMARY"
        echo ""
        echo "| Contrôle | Résultat |"
        echo "|----------|----------|"
        echo "| 🔍 Codengine ($(CHANGED_CS_COUNT) fichier(s) .cs) | $(ANALYZE_ICON) $(ANALYZE_LABEL) |"
        echo ""
        echo "*Commit : \`$COMMIT_SHORT\` — [Voir le rapport]($(System.TeamFoundationCollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)) — Codengine v$(CODENGINE_VERSION)*"
      } > "$COMMENT_FILE"

      if [ -f "$(Agent.TempDirectory)/violations.md" ] && [ -s "$(Agent.TempDirectory)/violations.md" ]; then
        {
          echo ""
          echo "<details>"
          echo "<summary>Violations détaillées</summary>"
          echo ""
          cat "$(Agent.TempDirectory)/violations.md"
          echo ""
          echo "</details>"
        } >> "$COMMENT_FILE"
      fi

      PAYLOAD=$(jq -n --arg body "$(cat "$COMMENT_FILE")" \
        '{"comments":[{"content":$body,"commentType":1}],"status":1}')

      THREADS_URL="$(System.TeamFoundationCollectionUri)$(System.TeamProjectId)/_apis/git/repositories/$(Build.Repository.ID)/pullRequests/$(System.PullRequest.PullRequestId)/threads?api-version=7.1"

      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$THREADS_URL" \
        -H "Authorization: Bearer $SYSTEM_ACCESSTOKEN" \
        -H "Content-Type: application/json" \
        -d "$PAYLOAD")

      echo "Commentaire posté (HTTP $HTTP_STATUS)"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
    displayName: Post PR comment
    condition: and(always(), ne(variables['System.PullRequest.PullRequestId'], ''))

  # ── Fail si erreurs (uniquement en contexte PR) ────────────────────────────
  - script: |
      [ "$(ANALYZE_PASSED)" != "true" ] && \
        echo "##vso[task.logissue type=error]Codengine a détecté des erreurs sur les fichiers modifiés." && \
        exit 1
      echo "Analyse OK."
    displayName: Fail pipeline if errors
    condition: and(always(), ne(variables['System.PullRequest.PullRequestId'], ''))
